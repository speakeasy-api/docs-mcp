_defaults: &defaults
  description: &description >-
    Dub TypeScript SDK — API references for links, analytics, domains, and workspaces
  docsSpec: &docsSpec
    url: https://github.com/dubinc/dub-ts
    ref: main
    docsConfig:
      version: "1"
      strategy:
        chunk_by: h2
  setup: &setup "npm init -y --silent 2>/dev/null && npm i -D typescript --silent 2>/dev/null"

_tsc: &tsc
  type: script
  command: >-
    npx -p typescript tsc --noEmit --esModuleInterop --moduleResolution node
    --module commonjs --target es2020 solution.ts
  name: typecheck

create-link:
  name: Create a Dub short link
  <<: *defaults
  category: sdk-usage
  prompt: >-
    Using the Dub TypeScript SDK (`dub`), write a script in solution.ts that creates a short link
    pointing to https://example.com. Use the Dub SDK's `links.create` method. Install all
    dependencies first with npm. The DUB_API_KEY environment variable is already set — use
    process.env.DUB_API_KEY for authentication. Do not run the script.
  assertions:
    - type: file_contains
      path: solution.ts
      value: dub
    - type: script
      command: "grep -q 'dub' package.json"
      name: dub-in-deps
    - *tsc
    - type: script
      command: "output=$(npx tsx solution.ts 2>&1) && echo \"$output\" | grep -qi 'short\\|link\\|url\\|dub'"
      name: runs-successfully
      when_env: DUB_API_KEY
      soft: true

list-analytics:
  name: List Dub analytics events
  <<: *defaults
  category: sdk-usage
  prompt: >-
    Using the Dub TypeScript SDK (`dub`), write a script in solution.ts that retrieves analytics for
    clicks. Use the SDK's analytics methods. Install all dependencies first with npm. The DUB_API_KEY
    environment variable is already set — use process.env.DUB_API_KEY for authentication. Do not run
    the script.
  assertions:
    - type: file_matches
      path: solution.ts
      pattern: dub
      flags: i
    - type: file_contains
      path: solution.ts
      value: analytics
    - *tsc
    - type: script
      command: "output=$(npx tsx solution.ts 2>&1) && echo \"$output\" | grep -qi 'click\\|analytics\\|count'"
      name: runs-successfully
      when_env: DUB_API_KEY
      soft: true

upsert-link:
  name: Upsert a Dub link
  <<: *defaults
  category: sdk-usage
  prompt: >-
    Using the Dub TypeScript SDK (`dub`), write a script in solution.ts that upserts a link (creates
    it if it doesn't exist, updates it otherwise). Use the SDK's `links.upsert` method. Install all
    dependencies first with npm. The DUB_API_KEY environment variable is already set — use
    process.env.DUB_API_KEY for authentication. Do not run the script.
  assertions:
    - type: file_matches
      path: solution.ts
      pattern: dub
      flags: i
    - type: file_contains
      path: solution.ts
      value: upsert
    - *tsc
    - type: script
      command: "output=$(npx tsx solution.ts 2>&1) && echo \"$output\" | grep -qi 'link\\|url\\|upsert'"
      name: runs-successfully
      when_env: DUB_API_KEY
      soft: true

get-link:
  name: Retrieve a Dub link by ID
  <<: *defaults
  category: sdk-usage
  prompt: >-
    Using the Dub TypeScript SDK (`dub`), write a script in solution.ts that retrieves an existing
    link's details by its link ID. Use the SDK's `links.get` method. Install all dependencies first
    with npm. The DUB_API_KEY environment variable is already set — use process.env.DUB_API_KEY for
    authentication. Do not run the script.
  assertions:
    - type: file_matches
      path: solution.ts
      pattern: dub
      flags: i
    - type: file_contains
      path: solution.ts
      value: links
    - *tsc
    - type: script
      command: "output=$(npx tsx solution.ts 2>&1) && echo \"$output\" | grep -qi 'link\\|url\\|id'"
      name: runs-successfully
      when_env: DUB_API_KEY
      soft: true

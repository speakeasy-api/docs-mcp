_defaults: &defaults
  description: &description >-
    PushPress TypeScript SDK — API references for members, checkins, webhooks, and classes
  docsSpec: &docsSpec
    url: https://github.com/pushpress/pushpress-ts
    ref: main
    docsConfig:
      version: "1"
      strategy:
        chunk_by: h2
  setup: &setup "npm init -y --silent 2>/dev/null && npm i -D typescript --silent 2>/dev/null"

_tsc: &tsc
  type: script
  command: >-
    npx -p typescript tsc --noEmit --esModuleInterop --moduleResolution node
    --module commonjs --target es2020 solution.ts
  name: typecheck

list-members:
  name: List PushPress members
  <<: *defaults
  category: sdk-usage
  prompt: >-
    Using the PushPress TypeScript SDK (`@pushpress/pushpress`), write a script in solution.ts that
    lists members (customers) from the PushPress API. Install all dependencies first with npm. The
    PUSHPRESS_API_KEY environment variable is already set — use process.env.PUSHPRESS_API_KEY for
    authentication. Do not run the script.
  assertions:
    - type: file_matches
      path: solution.ts
      pattern: pushpress
      flags: i
    - type: script
      command: "grep -q 'pushpress' package.json"
      name: pushpress-in-deps
    - *tsc
    - type: script
      command: "output=$(npx tsx solution.ts 2>&1) && echo \"$output\" | head -20 | grep -qi 'member\\|customer\\|name\\|email'"
      name: runs-successfully
      when_env: PUSHPRESS_API_KEY
      soft: true

get-checkins:
  name: Get PushPress checkins
  <<: *defaults
  category: sdk-usage
  prompt: >-
    Using the PushPress TypeScript SDK (`@pushpress/pushpress`), write a script in solution.ts that
    retrieves recent checkins from the PushPress API. Install all dependencies first with npm. The
    PUSHPRESS_API_KEY environment variable is already set — use process.env.PUSHPRESS_API_KEY for
    authentication. Do not run the script.
  assertions:
    - type: file_matches
      path: solution.ts
      pattern: pushpress
      flags: i
    - type: file_matches
      path: solution.ts
      pattern: checkin
      flags: i
    - *tsc
    - type: script
      command: "output=$(npx tsx solution.ts 2>&1) && echo \"$output\" | head -20 | grep -qi 'checkin\\|check'"
      name: runs-successfully
      when_env: PUSHPRESS_API_KEY
      soft: true

create-webhook:
  name: Create PushPress webhook
  <<: *defaults
  category: advanced
  prompt: >-
    Using the PushPress TypeScript SDK (`@pushpress/pushpress`), write a script in solution.ts that
    registers a webhook to listen for events. Install all dependencies first with npm. The
    PUSHPRESS_API_KEY environment variable is already set — use process.env.PUSHPRESS_API_KEY for
    authentication. Do not run the script.
  assertions:
    - type: file_matches
      path: solution.ts
      pattern: pushpress
      flags: i
    - type: file_matches
      path: solution.ts
      pattern: "webhook|event"
      flags: i
    - *tsc
    - type: script
      command: "output=$(npx tsx solution.ts 2>&1) && echo \"$output\" | head -20 | grep -qi 'webhook\\|event\\|created'"
      name: runs-successfully
      when_env: PUSHPRESS_API_KEY
      soft: true

list-classes:
  name: List PushPress classes
  <<: *defaults
  category: sdk-usage
  prompt: >-
    Using the PushPress TypeScript SDK (`@pushpress/pushpress`), write a script in solution.ts that
    lists available classes or scheduled sessions. Install all dependencies first with npm. The
    PUSHPRESS_API_KEY environment variable is already set — use process.env.PUSHPRESS_API_KEY for
    authentication. Do not run the script.
  assertions:
    - type: file_matches
      path: solution.ts
      pattern: pushpress
      flags: i
    - type: file_matches
      path: solution.ts
      pattern: "class|schedule|session"
      flags: i
    - *tsc
    - type: script
      command: "output=$(npx tsx solution.ts 2>&1) && echo \"$output\" | head -20 | grep -qi 'class\\|schedule\\|session'"
      name: runs-successfully
      when_env: PUSHPRESS_API_KEY
      soft: true
